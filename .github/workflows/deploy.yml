name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir server install --frozen-lockfile

      - name: Typecheck and build
        run: pnpm build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.APPLELEAF_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.APPLELEAF_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.APPLELEAF_DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.APPLELEAF_DEPLOY_PATH }}
      CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.APPLELEAF_CLOUDFLARE_ACCESS_CLIENT_ID }}
      CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.APPLELEAF_CLOUDFLARE_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Write deploy SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.APPLELEAF_DEPLOY_SSH_KEY }}" > ~/.ssh/appleleaf_deploy
          chmod 600 ~/.ssh/appleleaf_deploy

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Configure SSH for Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host production-mac
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT:-22}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/appleleaf_deploy
            IdentitiesOnly yes
            ServerAliveInterval 30
            ProxyCommand env CLOUDFLARE_ACCESS_CLIENT_ID=${CLOUDFLARE_ACCESS_CLIENT_ID} CLOUDFLARE_ACCESS_CLIENT_SECRET=${CLOUDFLARE_ACCESS_CLIENT_SECRET} cloudflared access tcp --hostname %h
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy over SSH
        run: |
          ssh production-mac "cd '$DEPLOY_PATH' && ./deploy/deploy.sh"
