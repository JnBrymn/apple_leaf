name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.APPLELEAF_DEPLOY_SSH_KEY }}

      - name: Trust production host
        env:
          DEPLOY_HOST: ${{ secrets.APPLELEAF_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.APPLELEAF_DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.APPLELEAF_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.APPLELEAF_DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.APPLELEAF_DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.APPLELEAF_DEPLOY_PATH }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && ./deploy/deploy.sh"
