<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    GAMBLE COUNT
    - Big number in the middle. Top says the number in words.
    - Click the number to count up toward 1 billion.
    - Every 10 is a checkpoint — restart sends you back to the last one.
    - Restart chance climbs slowly as your number grows — never resets at checkpoints.
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamble Count</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 60%, #050508 100%);
      color: #f0f0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      user-select: none;
      overflow: hidden;
    }

    .game {
      width: min(560px, 100%);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .word-label {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 600;
      color: #a8b4ff;
      text-transform: lowercase;
      letter-spacing: 0.04em;
      min-height: 2.6rem;
      margin-bottom: 0.5rem;
      transition: color 0.3s, transform 0.3s;
    }

    .word-label.danger {
      color: #ff8a80;
      animation: wobble 0.4s ease;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg) scale(1.02); }
      75% { transform: rotate(2deg) scale(1.02); }
    }

    .goal {
      font-size: 0.95rem;
      color: #6b7080;
      margin-bottom: 1.25rem;
    }

    .number-btn {
      display: block;
      margin: 0 auto 1.25rem;
      width: min(280px, 80vw);
      height: min(280px, 80vw);
      border: none;
      border-radius: 50%;
      background: linear-gradient(145deg, #4a6cf7 0%, #2d3fa8 100%);
      color: #fff;
      font-size: clamp(3.5rem, 18vw, 5.5rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      box-shadow:
        0 12px 0 #1e2d7a,
        0 18px 40px rgba(74, 108, 247, 0.35);
      transition: transform 0.06s, box-shadow 0.06s;
      line-height: 1;
      padding: 0 0.5rem;
    }

    .number-btn:active:not(:disabled) {
      transform: translateY(8px);
      box-shadow:
        0 4px 0 #1e2d7a,
        0 8px 20px rgba(74, 108, 247, 0.25);
    }

    .number-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .number-btn.restart-flash {
      animation: flash 0.6s ease;
    }

    @keyframes flash {
      0%, 100% { background: linear-gradient(145deg, #4a6cf7 0%, #2d3fa8 100%); }
      30% { background: linear-gradient(145deg, #ff5252 0%, #b71c1c 100%); transform: scale(0.95); }
      60% { background: linear-gradient(145deg, #ffab40 0%, #e65100 100%); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }

    .stat {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 0.75rem;
    }

    .stat-label {
      display: block;
      font-size: 0.78rem;
      color: #7a8090;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      font-size: clamp(1rem, 4vw, 1.35rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      word-break: keep-all;
      white-space: nowrap;
    }

    .risk-wrap {
      margin-bottom: 1rem;
    }

    .risk-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #8a90a0;
      margin-bottom: 0.35rem;
    }

    .risk-bar {
      height: 10px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .risk-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #66bb6a, #ffca28, #ef5350);
      border-radius: 999px;
      transition: width 0.15s ease-out;
    }

    .progress-section {
      margin-bottom: 0.75rem;
    }

    .progress-label {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: baseline;
      gap: 0.5rem;
      font-size: 1.05rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #b0b6c8;
      margin-bottom: 0.45rem;
      min-height: 1.8rem;
      padding: 0 0.25rem;
    }

    .progress-label .current-val {
      color: #e8ebff;
      font-size: 1.25rem;
      text-align: right;
      padding-right: 0.25rem;
    }

    .progress-label .slash {
      color: #6b7080;
      font-size: 1.1rem;
    }

    .progress-label .goal-val {
      color: #8a90a8;
      text-align: left;
      padding-left: 0.25rem;
    }

    .progress-wrap {
      height: 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5c6bc0, #7e57c2, #ab47bc);
      border-radius: 999px;
      transition: width 0.12s ease-out;
    }

    .message {
      min-height: 1.4rem;
      font-size: 0.95rem;
      color: #9aa0b0;
    }

    .message.bad { color: #ff8a80; font-weight: 600; }
    .message.good { color: #81c784; font-weight: 600; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 1rem;
    }

    .overlay.show { display: flex; }

    .overlay-card {
      background: #1e1e30;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      text-align: center;
      animation: pop 0.35s ease;
    }

    @keyframes pop {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .overlay-card h2 {
      margin: 0 0 0.75rem;
      font-size: 2rem;
      color: #a8b4ff;
    }

    .overlay-card p {
      margin: 0 0 1.25rem;
      color: #b0b4c0;
      line-height: 1.5;
    }

    .overlay-card button {
      font: inherit;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 10px;
      background: #4a6cf7;
      color: #fff;
      cursor: pointer;
    }

    .overlay-card button:hover { background: #5b7af8; }

    .spark {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      color: #a8b4ff;
      animation: rise 0.7s ease forwards;
      z-index: 5;
    }

    @keyframes rise {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-40px); }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="word-label" id="wordLabel">one</div>
    <div class="goal">Reach <strong>1B</strong> — checkpoint every <strong>10</strong></div>

    <button class="number-btn" id="numberBtn" type="button" aria-label="Add one">1</button>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">Checkpoint</span>
        <span class="stat-value" id="checkpointVal">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">Next at</span>
        <span class="stat-value" id="nextCpVal">10</span>
      </div>
    </div>

    <div class="risk-wrap">
      <div class="risk-label">
        <span>Restart chance</span>
        <span id="riskPct">0%</span>
      </div>
      <div class="risk-bar"><div class="risk-fill" id="riskFill"></div></div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span class="current-val" id="progressCurrent">1</span>
        <span class="slash">/</span>
        <span class="goal-val" id="progressGoal">1B</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="message" id="message">Click the number to grow!</div>
  </div>

  <div class="overlay" id="winOverlay">
    <div class="overlay-card">
      <h2>You hit 1B!</h2>
      <p>You made it to <strong>one billion</strong> without getting wiped out. Legend.</p>
      <button type="button" id="playAgainBtn">Play again</button>
    </div>
  </div>

  <script>
    const GOAL = 1_000_000_000;
    const CHECKPOINT_STEP = 10;

    const wordLabel = document.getElementById('wordLabel');
    const numberBtn = document.getElementById('numberBtn');
    const checkpointVal = document.getElementById('checkpointVal');
    const nextCpVal = document.getElementById('nextCpVal');
    const riskPct = document.getElementById('riskPct');
    const riskFill = document.getElementById('riskFill');
    const progressBar = document.getElementById('progressBar');
    const progressCurrent = document.getElementById('progressCurrent');
    const progressGoal = document.getElementById('progressGoal');
    const message = document.getElementById('message');
    const winOverlay = document.getElementById('winOverlay');
    const playAgainBtn = document.getElementById('playAgainBtn');

    let current = 1;
    let checkpoint = 1;
    let won = false;

    const ONES = [
      'zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine',
      'ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen',
      'seventeen', 'eighteen', 'nineteen'
    ];
    const TENS = [
      '', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'
    ];

    function chunkBelow1000(n) {
      if (n === 0) return '';
      if (n < 20) return ONES[n];
      const tens = Math.floor(n / 10);
      const ones = n % 10;
      return ones ? `${TENS[tens]}-${ONES[ones]}` : TENS[tens];
    }

    function chunkBelow1000000(n) {
      if (n === 0) return '';
      if (n < 1000) return chunkBelow1000(n);
      const hundreds = Math.floor(n / 100);
      const rest = n % 100;
      let out = `${ONES[hundreds]} hundred`;
      if (rest) out += ` ${chunkBelow1000(rest)}`;
      return out;
    }

    function numberToWords(n) {
      if (n === 0) return 'zero';
      if (n < 0) return `negative ${numberToWords(-n)}`;

      const billions = Math.floor(n / 1_000_000_000);
      const millions = Math.floor((n % 1_000_000_000) / 1_000_000);
      const thousands = Math.floor((n % 1_000_000) / 1000);
      const rest = n % 1000;

      const parts = [];
      if (billions) {
        parts.push(`${chunkBelow1000(billions)} billion`);
      }
      if (millions) {
        parts.push(`${chunkBelow1000(millions)} million`);
      }
      if (thousands) {
        parts.push(`${chunkBelow1000(thousands)} thousand`);
      }
      if (rest) {
        parts.push(chunkBelow1000000(rest));
      }
      return parts.join(' ');
    }

    function formatDisplay(n) {
      if (n >= 1_000_000_000) return '1B';
      if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(n >= 10_000_000 ? 0 : 1)}M`;
      if (n >= 10_000) return `${Math.round(n / 1000)}K`;
      if (n >= 1000) return n.toLocaleString();
      return String(n);
    }

    function lastCheckpoint(n) {
      if (n < CHECKPOINT_STEP) return 1;
      return Math.floor(n / CHECKPOINT_STEP) * CHECKPOINT_STEP;
    }

    function nextCheckpoint(n) {
      if (n < CHECKPOINT_STEP) return CHECKPOINT_STEP;
      return (Math.floor(n / CHECKPOINT_STEP) + 1) * CHECKPOINT_STEP;
    }

    function restartChance(n) {
      if (n <= 1) return 0;
      const progress = Math.log10(n) / Math.log10(GOAL);
      return Math.min(0.65, Math.pow(progress, 2) * 0.65);
    }

    function maybeRestart() {
      const chance = restartChance(current);
      if (chance <= 0 || Math.random() >= chance) return false;
      doRestart();
      return true;
    }

    function doRestart() {
      const saved = checkpoint;
      current = saved;
      wordLabel.classList.add('danger');
      numberBtn.classList.add('restart-flash');
      message.textContent = `Restart! Back to ${formatDisplay(saved)} (${numberToWords(saved)}).`;
      message.className = 'message bad';
      setTimeout(() => {
        wordLabel.classList.remove('danger');
        numberBtn.classList.remove('restart-flash');
      }, 700);
      updateUI();
    }

    function addOne() {
      if (won || current >= GOAL) return;

      current += 1;

      if (current >= GOAL) {
        current = GOAL;
        won = true;
        message.textContent = 'ONE BILLION. You did it!';
        message.className = 'message good';
        winOverlay.classList.add('show');
        numberBtn.disabled = true;
        updateUI();
        return;
      }

      const cp = lastCheckpoint(current);
      if (cp > checkpoint && current % CHECKPOINT_STEP === 0) {
        checkpoint = current;
        message.textContent = `Checkpoint saved at ${formatDisplay(checkpoint)}!`;
        message.className = 'message good';
        spawnSpark('✓');
        updateUI();
      } else {
        message.textContent = 'Keep going — restart danger climbs as your number grows.';
        message.className = 'message';
      }

      if (!maybeRestart()) {
        updateUI();
      }

      spawnSpark('+1');
    }

    function spawnSpark(text) {
      const el = document.createElement('div');
      el.className = 'spark';
      el.textContent = text;
      const rect = numberBtn.getBoundingClientRect();
      el.style.left = `${rect.left + rect.width / 2 + (Math.random() - 0.5) * 40}px`;
      el.style.top = `${rect.top + rect.height / 2}px`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function updateUI() {
      wordLabel.textContent = numberToWords(current);
      numberBtn.textContent = formatDisplay(current);

      checkpointVal.textContent = formatDisplay(checkpoint);
      const next = nextCheckpoint(current);
      nextCpVal.textContent = next >= GOAL ? '1B' : formatDisplay(next);

      const risk = restartChance(current);
      const riskDisplay = (risk * 100).toFixed(risk < 0.01 ? 2 : 1);
      riskPct.textContent = `${riskDisplay}%`;
      riskFill.style.width = `${Math.min(100, risk * 100)}%`;

      progressCurrent.textContent = formatDisplay(current);
      progressGoal.textContent = '1B';

      const progress = (current / GOAL) * 100;
      progressBar.style.width = `${Math.min(100, progress)}%`;

      if (risk > 0.25) {
        wordLabel.classList.add('danger');
      } else {
        wordLabel.classList.remove('danger');
      }
    }

    function resetGame() {
      current = 1;
      checkpoint = 1;
      won = false;
      numberBtn.disabled = false;
      winOverlay.classList.remove('show');
      message.textContent = 'Click the number to grow!';
      message.className = 'message';
      updateUI();
    }

    numberBtn.addEventListener('click', addOne);
    playAgainBtn.addEventListener('click', resetGame);

    updateUI();
  </script>
</body>
</html>
